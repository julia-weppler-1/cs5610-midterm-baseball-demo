<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baseball Card Finder</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Baseball Card Finder</h1>
        <button
          class="btn btn-outline-primary"
          data-bs-toggle="modal"
          data-bs-target="#uploadModal"
        >
          Upload cards
        </button>
      </header>
    </div>
    <main>
      <section>
        <div class="row">
          <div class="col-8">
            <h2>Cards</h2>
            <div class="filter-bar mb-3">
              <input
                id="team-filter"
                class="form-control"
                type="search"
                placeholder="Filter by team..."
                autocomplete="off"
              />
            </div>
            <div id="cards" class="cards-grid"></div>
          </div>
          <div class="col-4">
            <h3>Highlights</h3>
            <ul>
              <li>Derek Jeter Rookie Card sold for <b>$250</b></li>
              <li>The Los Angeles Dodgers win the 2025 MLB World Series 4-3</li>
              <li>More news available on <a href="">Mia's blog</a></li>
            </ul>
          </div>
        </div>
      </section>
      <section>
        <h2>Q&A</h2>
        <div>Info...</div>
      </section>
    </main>
    <footer>Made by Julia Weppler for CS5610 Midterm</footer>

    <div
      class="modal fade"
      id="uploadModal"
      tabindex="-1"
      aria-labelledby="uploadModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="upload-form">
            <div class="modal-header">
              <h5 class="modal-title" id="uploadModalLabel">Upload a Card</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-2">
                <label class="form-label" for="team">Team</label>
                <input class="form-control" id="team" name="team" required />
              </div>
              <div class="row">
                <div class="col mb-2">
                  <label class="form-label" for="first_name">First name</label>
                  <input
                    class="form-control"
                    id="first_name"
                    name="first_name"
                    required
                  />
                </div>
                <div class="col mb-2">
                  <label class="form-label" for="last_name">Last name</label>
                  <input
                    class="form-control"
                    id="last_name"
                    name="last_name"
                    required
                  />
                </div>
              </div>
              <div class="row">
                <div class="col mb-2">
                  <label class="form-label" for="State">State</label>
                  <input
                    class="form-control"
                    id="State"
                    name="State"
                    required
                  />
                </div>
                <div class="col mb-2">
                  <label class="form-label" for="year">Year</label>
                  <input
                    class="form-control"
                    id="year"
                    name="year"
                    type="number"
                    min="1800"
                    max="2100"
                    required
                  />
                </div>
              </div>
              <div class="mb-2">
                <label class="form-label" for="price"
                  >Lowest acceptable price</label
                >
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input
                    class="form-control"
                    id="price"
                    name="price"
                    type="number"
                    min="0"
                    step="1"
                    required
                  />
                </div>
              </div>
              <div
                id="upload-error"
                class="text-danger small mt-2"
                style="display: none"
              ></div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">Upload</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script type="module" src="./js/index.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
